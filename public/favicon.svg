<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Copilot Enterprise Spend Simulator">
  <title>Copilot Enterprise Spend Simulator</title>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6e7bff"/>
      <stop offset="1" stop-color="#b57bf6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="32" height="32" rx="7.5" fill="url(#tile)"/>
