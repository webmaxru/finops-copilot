    <div id="root"></div>
    <noscript>
      <main
        style="max-width: 46rem; margin: 0 auto; padding: 3rem 1.25rem; color: #eaf0ff; font-family: system-ui, sans-serif; line-height: 1.55;"
      >
        <h1 style="font-size: 1.9rem; line-height: 1.1; margin: 0 0 0.75rem;">
          Copilot Enterprise Spend Simulator
        </h1>
        <p style="color: #c1cbe6; margin: 0 0 1rem;">
          A browser-only simulator that models one month of <strong>GitHub Copilot</strong>
          enterprise spend under usage-based (AI-credit) billing — across Copilot
          <strong>Business</strong> and <strong>Enterprise</strong> seats and multiple
          <strong>cost centers</strong>. It shows the shared included credit pool draining and
          metered (overage) cost growing until it hits your configured budgets and limits.
        </p>
        <p style="color: #c1cbe6; margin: 0 0 1rem;">
          Adjust smart-default sliders, add or remove cost centers, then play an animated day
          1&nbsp;&rarr;&nbsp;30 simulation and read the KPIs, burndown/spend charts, and warnings.
          Every billing rule is validated against official GitHub documentation and tagged
          <em>[Fact]</em>, <em>[Derived]</em>, or <em>[Assumption]</em>.
        </p>
        <p style="color: #c1cbe6; margin: 0 0 1rem;">
          <strong>This is an interactive tool that needs JavaScript to run.</strong> Enable
          JavaScript, or explore the source and its full calculation documentation:
        </p>
